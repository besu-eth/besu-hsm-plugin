name: Release

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

    - name: Build distribution zip
      run: ./gradlew distZip

    - name: Extract changelog for this release
      run: |
        # Extract content between the first ## heading and the second ## heading
        awk '/^## /{if(++c==2)exit}c==1&&!/^## /' CHANGELOG.md > /tmp/release-notes.md

    - name: Update release notes from changelog
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release edit "${{ github.event.release.tag_name }}" --notes-file /tmp/release-notes.md

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "${{ github.event.release.tag_name }}" build/distributions/*.zip
